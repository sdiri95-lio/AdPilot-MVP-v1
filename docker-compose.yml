services:
  postgres:
    image: postgres:16-alpine
    container_name: ad-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ad_pilot_africa
    ports:
      - "5432:5432"
    volumes:
      - ad_pilot_postgres_data:/var/lib/postgresql/data

volumes:
  ad_pilot_postgres_data:
